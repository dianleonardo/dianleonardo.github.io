<!DOCTYPE html>
<html lang="it">
<head>
  <title>Agenda personale</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
  
    body {
      background-color: lightyellow;
      font-family: Arial, sans-serif;

    h1{
      color: rgb(152, 116, 116);

    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 10px;
      text-align: left;
    }
    th {
      background-color: rgb(138, 132, 201);
    }
  </style>
  <script>
    
  </script>
</head>

<body>
  <!--Agenda personal dove inseriro i miei eventi
      mi mostrera nella prima parte della pagina la settimana corrente con gli eventi che ho memorizzato
      e nell'ultima parte della pagina potro aggiungere nuovi eventi -->
  <h1>Agenda personale</h1>
    <!-- tabella con la settimana corrente -->
    <table>
        <tr id="giorni">
            <!-- le intestazioni dei giorni saranno generate dinamicamente dallo script -->
        </tr>
        <script>
            const giorniSettimana = [
    "Lunedì", "Martedì", "Mercoledì",
    "Giovedì", "Venerdì", "Sabato", "Domenica"
    ];

    const oggi = new Date();

    // trova il lunedì della settimana corrente
    const giorno = oggi.getDay(); // 0 = domenica
    const diff = (giorno === 0 ? -6 : 1 - giorno);

    const lunedi = new Date(oggi);
    lunedi.setDate(oggi.getDate() + diff);

    const tr = document.getElementById("giorni");

    for (let i = 0; i < 7; i++) {
        const data = new Date(lunedi);
        data.setDate(lunedi.getDate() + i);

        const th = document.createElement("th");

        // formato breve
        const dataFormattata = data.toLocaleDateString('it-IT');

            if (data.toDateString() === oggi.toDateString()) {
            th.style.backgroundColor = "yellow";
        }

        th.textContent = `${giorniSettimana[i]} ${dataFormattata}`;
        tr.appendChild(th);
    }
        </script>
    </table>
