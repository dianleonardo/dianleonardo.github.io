<!DOCTYPE html>
<html lang="it">
<head>
  <title>Agenda personale</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
  
    body {
      background-color: lightyellow;
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    h1{
      color: rgb(152, 116, 116);
      text-align: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 10px;
      text-align: left;
    }
    th {
      background-color: rgb(138, 132, 201);
    }
  </style>
  <script>
    function autentica() {
      var username = document.getElementsByName("username")[0].value;
      var password = document.getElementsByName("password")[0].value;

      if (username === "admin" && password === "prova") {
        alert("Autenticazione riuscita!");
        // reindirizzo alla pagina dell'agenda
        window.location.href = "agenda.html";
      } else {
        alert("Credenziali errate!");
      }
    }
  </script>
</head>

<body>
  <h1>Autenticazione</h1>
  <table>
    <tr>
      <th>Username</th>
      <th>Password</th>
    </tr>
    <tr>
      <td><input type="text" name="username"></td>
      <td><input type="password" name="password"></td>
    </tr>
  </table>
  <button onclick="autentica()">Accedi</button>

</body>

</html>
